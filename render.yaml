# render.yaml — Render.com deployment configuration
#
# Services deployed:
#   1. web       — FastAPI app (handles REST + WebSocket)
#   2. worker    — Celery worker (processes humanization tasks)
#   3. redis     — Redis instance (broker + pub/sub + result backend)
#
# Deploy steps:
#   1. Push this repo to GitHub
#   2. Go to render.com → New → Blueprint
#   3. Connect your repo — Render auto-detects this file
#   4. Set the GEMINI_KEY env var is NOT needed server-side (BYOK — key comes per-request)
#   5. Redis URL is auto-injected via the fromDatabase reference below

services:
  # ── FastAPI Web Service ────────────────────────────────────────────────────
  - type: web
    name: dochumanize-api
    runtime: python
    plan: free              # Free tier works — no heavy models on web service
    region: oregon             # Pick region closest to your users

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm

    startCommand: >
      uvicorn main:app
      --host 0.0.0.0
      --port $PORT
      --workers 2
      --loop uvloop
      --http httptools

    envVars:
      - key: REDIS_URL
        fromDatabase:
          name: dochumanize-redis
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
      # Model cache — prevents re-downloading on every deploy
      - key: TRANSFORMERS_CACHE
        value: /opt/render/project/.cache/huggingface
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /opt/render/project/.cache/sentence_transformers

    healthCheckPath: /health
    autoDeploy: true

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: dochumanize-worker
    runtime: python
    plan: free             # HF detector runs via API — only SBERT loads locally (~90MB)
    region: oregon

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm

    startCommand: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=humanize
      --max-tasks-per-child=10

    envVars:
      - key: REDIS_URL
        fromDatabase:
          name: dochumanize-redis
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRANSFORMERS_CACHE
        value: /opt/render/project/.cache/huggingface
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /opt/render/project/.cache/sentence_transformers

    autoDeploy: true

# ── Redis ──────────────────────────────────────────────────────────────────────
databases:
  - name: dochumanize-redis
    type: redis
    plan: starter              # Upgrade if you need persistence / more memory
    region: oregon
    maxmemoryPolicy: allkeys-lru